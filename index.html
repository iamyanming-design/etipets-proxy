*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-name{font-size:.8rem;font-weight:500;flex:1;line-height:1.3}
.sb-count{font-size:.68rem;background:var(--bg);color:var(--muted);padding:2px 6px;border-radius:8px;border:1px solid var(--border)}
.sb-divider{height:1px;background:var(--border);margin:8px 14px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;

.stat::after{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;opacity:.08}
.stat.gold::after{background:var(--accent)}.stat.grn::after{background:var(--green)}
.stat.red::after{background:var(--red)}.stat.blu::after{background:var(--blue)}
.stat-lbl{font-size:.7rem;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:2rem;font-weight:900;line-height:1}
.stat.gold .stat-val{color:var(--accent)}.stat.grn .stat-val{color:var(--green)}
.stat.red .stat-val{color:var(--red)}.stat.blu .stat-val{color:var(--blue)}
.stat-sub{font-size:.68rem;color:var(--muted);margin-top:5px}
.sec-title{font-size:1rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px}

.data-table td{padding:11px 16px;font-size:.8rem;border-top:1px solid var(--border)}

.step-done{color:var(--green)}.step-active{color:var(--accent)}.step-pending{color:var(--border)}
.progress-bar{width:280px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:2px;transition:width .5s ease}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
@media(max-width:1100px){.stats{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{display:none}.content{padding:16px}.store-grid{grid-template-columns:1fr}}
</style>

// ── 情感推算（依真實評分） ──
function calcSentiment(rating) {
  const pos = Math.min(97, Math.round((rating - 1) / 4 * 100 + (rating >= 4.5 ? 8 : 0)));
  const neg = Math.max(1, Math.round((5 - rating) * 7));
  return { pos, neu: Math.max(1, 100 - pos - neg), neg };
}
function regionAvg(r) {
  const avg = r.stores.reduce((a,s)=>a+s.rating,0)/r.stores.length;
  const total = r.stores.reduce((a,s)=>a+s.count,0);
  return { avg: parseFloat(avg.toFixed(2)), total, ...calcSentiment(avg) };
}

// ── CORE: 用 SerpApi 抓取真實 Google Maps 評論 ──
async function fetchRealReviews(storeName, regionName) {
  const fetchOpts = { method: 'GET', mode: 'cors', cache: 'no-cache' };

  // Step 1: 透過 Proxy 搜尋店名取得 data_id
  const searchUrl = `${PROXY_URL}/search?engine=google_maps&q=${encodeURIComponent('東森寵物 ' + storeName)}&hl=zh-tw&gl=tw`;
  
  let dataId = null;
  let d1;
  try {
    const r1 = await fetch(searchUrl, fetchOpts);
    if (!r1.ok) throw new Error('HTTP ' + r1.status);
    d1 = await r1.json();
    if (d1.error) throw new Error(d1.error);
    // 處理 local_results（多筆結果）
    if (d1.local_results && d1.local_results.length > 0) {
      const matched = d1.local_results.find(r => r.title && r.title.includes(storeName.replace(/[店館院]/g,'')))
                   || d1.local_results[0];
      dataId = matched.data_id;
    }
    // 處理 place_results（單一結果）
    else if (d1.place_results && d1.place_results.data_id) {
      dataId = d1.place_results.data_id;
    }
  } catch(e) {
    throw new Error('搜尋失敗: ' + e.message);
  }

  if (!dataId) throw new Error('找不到門市資料，請確認門市名稱');

  // Step 2: 透過 Proxy 用 data_id 抓取真實評論
  const reviewUrl = `${PROXY_URL}/search?engine=google_maps_reviews&data_id=${encodeURIComponent(dataId)}&hl=zh-tw&sort_by=newestFirst`;
  
  let reviews = [], placeInfo = null;
  try {
    const r2 = await fetch(reviewUrl, fetchOpts);
    if (!r2.ok) throw new Error('HTTP ' + r2.status);
    const d2 = await r2.json();
    if (d2.error) throw new Error(d2.error);
    reviews = d2.reviews || [];
    placeInfo = d2.place_info || null;
  } catch(e) {
    throw new Error('抓取評論失敗: ' + e.message);
  }

  if (reviews.length === 0) throw new Error('此門市目前無評論資料');
  return { reviews, placeInfo, dataId };
}

// ── AI 分析真實評論 ──
async function analyzeReviews(storeName, regionName, realReviews) {
  const reviewsText = realReviews.slice(0, 15).map((r, i) => 
    `[${i+1}] ${r.user?.name || '匿名'} (${r.rating}星) ${r.date || ''}: ${r.snippet || r.text || '(無文字評論)'}`
  ).join('\n');

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 2000,
      messages: [{
        role: 'user',
        content: `你是東森寵物門市評論分析專家。以下是「${storeName}」（${regionName}）在 Google Maps 上的【真實評論】：

${reviewsText}

請針對以上真實評論，為每則評論提供分析，並回傳 JSON 格式：
{
  "reviews": [
    {
      "index": 1,
      "sentiment": "positive|neutral|negative",
      "pros": "優點（15字內，正評才填）",
      "cons": "缺點（15字內，負評或中評才填）",
      "tip": "改善建議（15字內，有缺點才填）"
    }
  ],
  "summary": {
    "top_pros": ["整體優點1","整體優點2","整體優點3"],
    "top_cons": ["整體缺點1","整體缺點2"],
    "top_tips": ["改善建議1","改善建議2"],
    "conclusion": "本店50字內整體結論"
  }
}
只回傳 JSON，不要其他文字。`
      }]
    })
  });
  const d = await resp.json();
  const raw = d.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
  return JSON.parse(raw);
}

// ── 開啟 Modal ──
async function openModal(storeName, regionName, manager, url, rating, count) {
  document.getElementById('mTitle').textContent = `${storeName} — 真實評論分析`;
  document.getElementById('mSub').textContent = `${regionName} · ${manager}區 · ⭐${rating} · ${count.toLocaleString()}則評論`;
  document.getElementById('mBody').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
      <div class="loading-steps" id="loadSteps">
        <div id="s1" class="step-active">⏳ Step 1：搜尋 Google Maps 門市資料...</div>
        <div id="s2" class="step-pending">○ Step 2：抓取真實 Google 評論...</div>
        <div id="s3" class="step-pending">○ Step 3：AI 智能分析評論內容...</div>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');

  const setStep = (n, msg) => {
    for(let i=1;i<=3;i++) {
      const el = document.getElementById('s'+i);
      if(el) el.className = i<n?'step-done':i===n?'step-active':'step-pending';
      if(el && i<n) el.textContent = el.textContent.replace('⏳','✅').replace('○','✅');
      if(el && i===n && msg) el.textContent = '⏳ ' + msg;
    }
    document.getElementById('prog').style.width = (n-1)*33+'%';
  };

  try {
    // Step 1: 搜尋門市
    setStep(1, 'Step 1：搜尋 Google Maps 門市資料...');
    const { reviews: rawReviews, placeInfo, dataId } = await fetchRealReviews(storeName, regionName);
    
    if (!rawReviews || rawReviews.length === 0) {
      throw new Error('此門市目前無法取得評論（可能需要更多搜尋配額）');
    }

    // Step 2: 取得評論
    setStep(2, 'Step 2：已取得 ' + rawReviews.length + ' 則真實評論...');
    await new Promise(r=>setTimeout(r,300));

    // Step 3: AI 分析
    setStep(3, 'Step 3：AI 正在分析評論內容...');
    const analysis = await analyzeReviews(storeName, regionName, rawReviews);
    
    document.getElementById('prog').style.width = '100%';
    await new Promise(r=>setTimeout(r,300));

    renderRealReviews(storeName, regionName, url, rating, count, rawReviews, analysis, placeInfo);

  } catch(err) {
    document.getElementById('mBody').innerHTML = `
      <div class="error-box">
        <strong>⚠️ 抓取失敗</strong><br><br>
        ${err.message}<br><br>
        <strong>可能原因：</strong><br>
        • SerpApi 免費方案每月 250 次搜尋限制（每間門市需 2 次：搜尋 + 取評論）<br>
        • 門市名稱在 Google Maps 上的搜尋結果不精確<br><br>
        <a href="${url}" target="_blank" style="color:var(--blue)">🔗 點此直接前往 Google Maps 查看真實評論</a>
      </div>`;
  }
}

  const badge = a.sentiment==='positive'?'✅ 正評':a.sentiment==='neutral'?'🟡 中性':'❌ 負評';
  const stars = '★'.repeat(r.rating||0) + '☆'.repeat(5-(r.rating||0));
  const isGuide = r.user?.local_guide ? ' · 在地嚮導' : '';
  const reviewCount = r.user?.reviews ? ` · ${r.user.reviews}則評論` : '';
  
  return `

function noData() { return '<p style="color:var(--muted);text-align:center;padding:24px">無此類評論</p>'; }
function swTab(el, id) {

let charts = {};
function destroyCharts() { Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }
function mkChart(id, type, data, opts={}) {
  const ctx = document.getElementById(id); if(!ctx) return;
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(ctx, { type, data, options:{
    responsive:true,
    plugins:{legend:{labels:{color:'#7a8ba8',font:{size:11}}}},
    scales: ['doughnut','pie','radar'].includes(type) ? {} : {
      y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#7a8ba8'}},
      x:{grid:{display:false},ticks:{color:'#7a8ba8',maxRotation:40,font:{size:10}}}
    }, ...opts
  }});
}

function showView(view, rid) {
  destroyCharts();
  document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById(rid?`sb-${rid}`:`sb-${view}`);
  if(el) el.classList.add('active');
  const c = document.getElementById('content');
  if(view==='overview') renderOverview(c);
  else if(view==='ranking') renderRanking(c);
  else if(view==='conclusion') renderConclusion(c);
  else if(view==='region') renderRegion(c, rid);
}

function storeCard(s, r) {
  const st = calcSentiment(s.rating);
  return `
  <div class="sc" onclick="openModal('${s.name.replace(/'/g,"\\'")}','${r.name}','${r.manager}','${s.url}',${s.rating},${s.count})">
    <div class="sc-head">
      <div>
        <div style="font-size:.62rem;padding:2px 7px;border-radius:4px;margin-bottom:5px;display:inline-block;background:${r.color}22;color:${r.color};border:1px solid ${r.color}44">${r.name} · ${r.manager}</div>
        <div class="sc-name">${s.name}</div>
      </div>
      <div class="sc-r">
        <div style="font-size:.75rem;color:var(--accent)">${s.rating>=4.8?'★★★★★':s.rating>=4.5?'★★★★½':'★★★★☆'}</div>
        <div class="sc-num">${s.rating.toFixed(1)}</div>
        <div class="sc-cnt">${s.count.toLocaleString()} 則評論</div>
      </div>
    </div>
    <div class="sc-body">
      <div class="sent-row">
        <div class="sent-bar">
          <div class="bar-pos" style="width:${st.pos}%"></div>
          <div class="bar-neu" style="width:${st.neu}%"></div>
          <div class="bar-neg" style="width:${st.neg}%"></div>
        </div>
        <div class="sent-lbl">🟢${st.pos}% 🟡${st.neu}% 🔴${st.neg}%</div>
      </div>
    </div>
    <div class="sc-foot">
      <a class="glink" href="${s.url}" target="_blank" onclick="event.stopPropagation()">🔗 Google評論</a>
      <button class="btn-live" onclick="event.stopPropagation();openModal('${s.name.replace(/'/g,"\\'")}','${r.name}','${r.manager}','${s.url}',${s.rating},${s.count})">
        <div class="live-dot"></div>真實評論分析

    </div>
  </div>`;
}

      <div class="stat red"><div class="stat-lbl">最高評分門市</div><div class="stat-val">${top.rating}</div><div class="stat-sub">${top.name}</div></div>
    </div>
    <div class="charts">
      <div class="chart-box"><h3>各區平均評分</h3><canvas id="cR"></canvas></div>
      <div class="chart-box"><h3>各區評論則數佔比</h3><canvas id="cC"></canvas></div>

    <div class="region-table">
      <div class="rt-row rt-head"><div>區域 / 負責人</div><div>情感分布</div><div style="text-align:right">平均評分</div><div style="text-align:center">門市數</div></div>

        <div class="rt-row">
          <div><div class="rt-name" style="color:${r.color}" onclick="showView('region','${r.id}')">${r.name}</div><div style="font-size:.68rem;color:var(--muted)">${r.manager} 區</div></div>

          <div style="font-size:.62rem;color:var(--muted);margin-top:3px">🟢${a.pos}% 🟡${a.neu}% 🔴${a.neg}%</div></div>
          <div class="rt-rating" style="color:${r.color}">${a.avg.toFixed(1)} ⭐</div>
          <div class="rt-stores">${r.stores.length}</div>
        </div>`}).join('')}
    </div>
    <div class="sec-title">🏪 所有門市</div>
    <div class="filter-bar">
      <input class="fi" id="fs" placeholder="🔍 搜尋門市..." oninput="fAll()">

    fAll();
  },80);

function fAll() {
  const q=(document.getElementById('fs').value||'').toLowerCase();
  const rf=document.getElementById('fr').value;
  const sort=document.getElementById('fsort').value;
  let items=REGIONS.flatMap(r=>r.stores.map(s=>({...s,region:r})));
  if(q) items=items.filter(s=>s.name.includes(q));
  if(rf) items=items.filter(s=>s.region.id===rf);
  if(sort==='rd') items.sort((a,b)=>b.rating-a.rating);
  else if(sort==='ra') items.sort((a,b)=>a.rating-b.rating);
  else if(sort==='cd') items.sort((a,b)=>b.count-a.count);
  else if(sort==='ca') items.sort((a,b)=>a.count-b.count);
  document.getElementById('allGrid').innerHTML=items.map(s=>storeCard(s,s.region)).join('');
}

    const bins=[{l:'< 4.0',mn:0,mx:3.99},{l:'4.0-4.2',mn:4.0,mx:4.29},{l:'4.3-4.4',mn:4.3,mx:4.49},{l:'4.5-4.6',mn:4.5,mx:4.69},{l:'4.7-4.8',mn:4.7,mx:4.89},{l:'4.9-5.0',mn:4.9,mx:5.0}];
    const allS2=REGIONS.flatMap(r=>r.stores);
    mkChart('cDist','bar',{labels:bins.map(b=>b.l),datasets:[{label:'門市數',data:bins.map(b=>allS2.filter(s=>s.rating>=b.mn&&s.rating<=b.mx).length),backgroundColor:['#ef444488','#f9731688','#f59e0b88','#10b98188','#6366f188','#a855f788'],borderColor:['#ef4444','#f97316','#f59e0b','#10b981','#6366f1','#a855f7'],borderWidth:2,borderRadius:4}]});
  },80);
}

buildSidebar();
showView('overview');
</script>
