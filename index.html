<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東森寵物 Google評論真實分析系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4f8; --surface:#ffffff; --surface2:#f8fafc; --border:#e2e8f0;
  --accent:#d97706; --green:#059669; --red:#dc2626; --blue:#4f46e5; --purple:#7c3aed; --cyan:#0891b2;
  --text:#1e293b; --muted:#64748b; --text-inv:#ffffff;
  --pos-bg:#dcfce7; --neu-bg:#fef9c3; --neg-bg:#fee2e2;
  --pos-border:#86efac; --neu-border:#fde047; --neg-border:#fca5a5;
  --shadow:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#1e3a5f 0%,#1e40af 50%,#312e81 100%);
  border-bottom:3px solid #f59e0b;
  padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-icon{width:44px;height:44px;background:linear-gradient(135deg,#f59e0b,#f97316);
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 2px 8px rgba(245,158,11,.4)}
.hdr-title h1{font-size:1.2rem;font-weight:800;color:#fff;letter-spacing:.3px}
.hdr-title p{font-size:.7rem;color:#93c5fd;margin-top:2px}
.hdr-badge{background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:800;
  font-size:.68rem;padding:5px 13px;border-radius:20px;letter-spacing:1px;
  display:flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(16,185,129,.3)}
.live-dot{width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.legend-bar{display:flex;align-items:center;gap:10px;font-size:.71rem;
  background:rgba(255,255,255,.15);padding:7px 14px;border-radius:8px;
  border:1px solid rgba(255,255,255,.2);color:#e2e8f0}
.legend-bar span{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-sep{color:rgba(255,255,255,.3)}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 83px)}
.sidebar{width:240px;min-width:240px;background:var(--surface);
  border-right:2px solid var(--border);
  padding:16px 0;overflow-y:auto;height:calc(100vh - 83px);
  position:sticky;top:83px;box-shadow:2px 0 8px rgba(0,0,0,.04)}
.content{flex:1;padding:24px 28px;overflow-y:auto;max-width:1400px}

/* ── SIDEBAR ── */
.sb-sec-title{font-size:.62rem;font-weight:800;color:var(--muted);letter-spacing:2px;
  text-transform:uppercase;padding:12px 16px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;
  transition:all .15s;border-left:3px solid transparent;user-select:none;border-radius:0 6px 6px 0;margin:1px 8px 1px 0}
.sb-item:hover{background:#eff6ff;border-left-color:#93c5fd}
.sb-item.active{background:#eff6ff;border-left-color:#1e40af;box-shadow:var(--shadow)}
.sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sb-name{font-size:.8rem;font-weight:600;flex:1;line-height:1.3;color:var(--text)}
.sb-item.active .sb-name{color:#1e40af;font-weight:700}
.sb-count{font-size:.65rem;background:var(--bg);color:var(--muted);
  padding:2px 7px;border-radius:10px;border:1px solid var(--border);font-weight:600}
.sb-divider{height:1px;background:var(--border);margin:8px 14px}

/* ── STAT CARDS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;
  box-shadow:var(--shadow-md);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0}
.stat.gold::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.stat.grn::before{background:linear-gradient(90deg,#059669,#10b981)}
.stat.red::before{background:linear-gradient(90deg,#dc2626,#ef4444)}
.stat.blu::before{background:linear-gradient(90deg,#4f46e5,#6366f1)}
.stat-lbl{font-size:.7rem;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:.3px}
.stat-val{font-size:2rem;font-weight:900;line-height:1}
.stat.gold .stat-val{color:#b45309}
.stat.grn .stat-val{color:#065f46}
.stat.red .stat-val{color:#991b1b}
.stat.blu .stat-val{color:#312e81}
.stat-sub{font-size:.68rem;color:var(--muted);margin-top:6px;font-weight:500}

/* ── SECTION TITLE ── */
.sec-title{font-size:1rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:var(--text)}
.sec-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── CHARTS ── */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.chart-box h3{font-size:.75rem;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--border)}

/* ── REGION TABLE ── */
.region-table{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow)}
.rt-row{display:grid;grid-template-columns:180px 1fr 90px 60px;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border)}
.rt-row:last-child{border-bottom:none}
.rt-row:hover{background:#f8fafc}
.rt-head{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#e2e8f0;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rt-name{font-size:.85rem;font-weight:700;cursor:pointer;transition:color .15s}
.rt-name:hover{color:#1e40af}
.rt-bar{height:22px;border-radius:6px;background:var(--bg);overflow:hidden;display:flex;border:1px solid var(--border)}
.bar-pos{background:linear-gradient(90deg,#059669,#10b981)}
.bar-neu{background:linear-gradient(90deg,#d97706,#f59e0b)}
.bar-neg{background:linear-gradient(90deg,#dc2626,#ef4444)}
.rt-rating{font-size:.88rem;font-weight:800;text-align:right}
.rt-stores{font-size:.72rem;color:var(--blue);text-align:center;font-weight:700}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.fi{background:var(--surface);border:2px solid var(--border);color:var(--text);
  padding:8px 14px;border-radius:8px;font-size:.78rem;font-family:inherit;
  cursor:pointer;transition:border-color .15s;box-shadow:var(--shadow)}
.fi:focus{outline:none;border-color:#1e40af}
.fi::placeholder{color:var(--muted)}
input.fi{flex:1;min-width:180px}

/* ── STORE GRID ── */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;margin-bottom:24px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.sc:hover{border-color:#1e40af;transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.sc-head{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;
  border-bottom:1px solid var(--border);background:var(--surface2)}
.sc-name{font-size:.92rem;font-weight:800;margin-bottom:4px;color:var(--text)}
.sc-r{text-align:right;flex-shrink:0;margin-left:8px}
.sc-stars{font-size:.78rem}
.sc-num{font-size:1.6rem;font-weight:900;line-height:1.1}
.sc-cnt{font-size:.65rem;color:var(--muted);font-weight:600}
.sc-body{padding:12px 16px;background:var(--surface)}
.sent-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sent-bar{flex:1;height:8px;border-radius:4px;background:var(--bg);overflow:hidden;display:flex;border:1px solid var(--border)}
.sent-legend{display:flex;gap:10px;font-size:.65rem;font-weight:600}
.sl-pos{color:#065f46}.sl-neu{color:#92400e}.sl-neg{color:#991b1b}
.sc-foot{padding:10px 16px;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.glink{font-size:.72rem;color:#1e40af;text-decoration:none;display:flex;align-items:center;gap:4px;font-weight:600}
.glink:hover{color:#1e3a5f;text-decoration:underline}
.btn-live{font-size:.72rem;background:linear-gradient(135deg,#059669,#047857);border:none;color:#fff;
  padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;
  display:flex;align-items:center;gap:5px;box-shadow:0 2px 4px rgba(5,150,105,.3);transition:all .15s}
.btn-live:hover{background:linear-gradient(135deg,#047857,#065f46);transform:translateY(-1px)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);
  z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  width:92%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 25px 50px rgba(0,0,0,.15)}
.modal-hdr{padding:20px 24px;border-bottom:2px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
  background:linear-gradient(135deg,#1e3a5f,#1e40af)}
.modal-title{font-size:1.1rem;font-weight:800;color:#fff}
.modal-sub{font-size:.75rem;color:#93c5fd;margin-top:4px}
.modal-x{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
  color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:1rem;transition:all .15s}
.modal-x:hover{background:rgba(239,68,68,.3)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;background:var(--bg)}

/* MODAL TABS */
.mtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.mtab{padding:6px 14px;border-radius:6px;border:2px solid var(--border);
  background:var(--surface);cursor:pointer;font-size:.75rem;color:var(--muted);
  transition:all .15s;font-weight:600}
.mtab:hover{border-color:#1e40af;color:#1e40af}
.mtab.active{background:#1e40af;color:#fff;border-color:#1e40af;font-weight:700;box-shadow:0 2px 6px rgba(30,64,175,.3)}

/* REVIEW CARDS */
.rv{border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid;transition:all .2s}
.rv.positive{background:var(--pos-bg);border-color:var(--pos-border)}
.rv.neutral{background:var(--neu-bg);border-color:var(--neu-border)}
.rv.negative{background:var(--neg-bg);border-color:var(--neg-border)}
.rv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
.rv-author{font-size:.88rem;font-weight:800;color:var(--text)}
.rv-author-meta{font-size:.68rem;color:var(--muted);margin-top:2px}
.rv-meta{display:flex;align-items:center;gap:7px;flex-shrink:0}
.rv-stars{font-size:.78rem}
.rv-date{font-size:.68rem;color:var(--muted);font-weight:500}
.sbadge{font-size:.62rem;font-weight:800;padding:3px 10px;border-radius:20px}
.sbadge.positive{background:#059669;color:#fff}
.sbadge.neutral{background:#d97706;color:#fff}
.sbadge.negative{background:#dc2626;color:#fff}
.rv-text{font-size:.84rem;line-height:1.7;color:#1e293b;margin-bottom:12px;font-weight:400}
.rv-analysis{background:rgba(0,0,0,.04);border-radius:10px;padding:12px;border:1px solid rgba(0,0,0,.08)}
.av{display:flex;gap:8px;margin-bottom:6px;font-size:.76rem}
.av:last-child{margin-bottom:0}
.al{white-space:nowrap;font-weight:800;min-width:58px}
.al.p{color:#065f46}.al.c{color:#991b1b}.al.t{color:#312e81}
.ac{color:var(--text);line-height:1.5;font-weight:500}
.source-badge{font-size:.62rem;background:#dcfce7;color:#065f46;
  border:1px solid #86efac;padding:4px 10px;border-radius:6px;
  display:inline-flex;align-items:center;gap:5px;margin-bottom:12px;font-weight:700}

/* SUMMARY */
.summary-box{background:var(--surface);border-radius:12px;padding:18px;margin-bottom:16px;
  border:1px solid var(--border);box-shadow:var(--shadow)}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.sum-col h4{font-size:.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid}
.sum-col.p h4{color:#065f46;border-color:#86efac}
.sum-col.c h4{color:#991b1b;border-color:#fca5a5}
.sum-col.t h4{color:#312e81;border-color:#a5b4fc}
.sum-col ul{list-style:none}
.sum-col ul li{font-size:.78rem;color:var(--text);padding:5px 0;
  border-bottom:1px solid var(--border);display:flex;gap:6px;line-height:1.5;font-weight:500}
.sum-col ul li::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.sum-col.p ul li::before{background:#059669}
.sum-col.c ul li::before{background:#dc2626}
.sum-col.t ul li::before{background:#4f46e5}

/* CONCLUSION */
.concl{background:linear-gradient(135deg,#eff6ff,#f0fdf4);
  border:2px solid #bfdbfe;border-radius:14px;padding:24px;margin-bottom:24px;box-shadow:var(--shadow)}
.concl-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.concl-sec h4{font-size:.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;
  padding:6px 10px;border-radius:6px}
.concl-sec.s h4{color:#065f46;background:#dcfce7}
.concl-sec.w h4{color:#991b1b;background:#fee2e2}
.concl-sec.i h4{color:#92400e;background:#fef3c7}
.concl-sec.n h4{color:#312e81;background:#ede9fe}
.concl-list{list-style:none}
.concl-list li{font-size:.8rem;color:var(--text);padding:5px 0 5px 14px;position:relative;line-height:1.6;font-weight:500}
.concl-list li::before{content:'→';position:absolute;left:0;font-weight:800}
.concl-sec.s .concl-list li::before{color:#059669}
.concl-sec.w .concl-list li::before{color:#dc2626}
.concl-sec.i .concl-list li::before{color:#d97706}
.concl-sec.n .concl-list li::before{color:#4f46e5}

/* DATA TABLE */
.data-table{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow)}
.data-table table{width:100%;border-collapse:collapse}
.data-table th{padding:12px 16px;text-align:left;font-size:.7rem;color:#e2e8f0;
  font-weight:800;background:linear-gradient(135deg,#1e3a5f,#1e40af);text-transform:uppercase;letter-spacing:.5px}
.data-table td{padding:12px 16px;font-size:.82rem;border-top:1px solid var(--border);color:var(--text);font-weight:500}
.data-table tr:hover td{background:#f8fafc}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:#059669;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:.84rem;color:var(--muted);font-weight:600}
.progress-bar{width:280px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#059669,#10b981);border-radius:3px;transition:width .5s ease}
.step-done{color:#059669;font-weight:700}
.step-active{color:#d97706;font-weight:700}
.step-pending{color:var(--muted)}
.loading-steps{font-size:.78rem;text-align:center;line-height:2}
.error-box{background:#fee2e2;border:2px solid #fca5a5;border-radius:12px;padding:18px;
  color:#991b1b;font-size:.82rem;line-height:1.7;font-weight:500}

/* ── RWD ── */
@media(max-width:1200px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .charts{grid-template-columns:1fr}
  .concl-grid{grid-template-columns:1fr}
  .sum-grid{grid-template-columns:1fr}
}
@media(max-width:900px){
  .sidebar{display:none}
  .content{padding:16px}
  .store-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .rt-row{grid-template-columns:120px 1fr 70px 50px;gap:8px;padding:10px 14px}
  .legend-bar{display:none}
}
@media(max-width:600px){
  .hdr{padding:12px 16px;flex-wrap:wrap;gap:10px}
  .hdr-title h1{font-size:1rem}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat{padding:14px}
  .stat-val{font-size:1.6rem}
  .store-grid{grid-template-columns:1fr}
  .charts{grid-template-columns:1fr}
  .modal{width:98%;max-height:95vh;border-radius:12px}
  .modal-hdr{padding:16px}
  .modal-body{padding:14px}
  .mtabs{gap:5px}
  .mtab{padding:5px 10px;font-size:.7rem}
  .rt-row{grid-template-columns:100px 1fr 60px;gap:6px}
  .rt-stores{display:none}
  .concl-grid{grid-template-columns:1fr}
  .sum-grid{grid-template-columns:1fr}
  .filter-bar{flex-direction:column}
  input.fi{min-width:unset;width:100%}
  .sc-num{font-size:1.3rem}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-icon">🐾</div>
    <div class="hdr-title">
      <h1>東森寵物 Google 評論真實分析系統</h1>
      <p>即時抓取 Google Maps 真實評論 · AI 智能分析 · 9區 108店 · 5/13更新</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="legend-bar">
      <span><div class="legend-dot" style="background:#10b981"></div> 正評（4-5星）</span>
      <span class="legend-sep">|</span>
      <span><div class="legend-dot" style="background:#f59e0b"></div> 中性（3星）</span>
      <span class="legend-sep">|</span>
      <span><div class="legend-dot" style="background:#ef4444"></div> 負評（1-2星）</span>
    </div>
    <div class="hdr-badge"><div class="live-dot"></div>LIVE 真實評論</div>

</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="mTitle">評論分析</div>
        <div class="modal-sub" id="mSub"></div>
      </div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const PROXY_URL = 'https://etipets-proxy.onrender.com';
// AI分析已改為本地自動分析（免費版）

// ══════════════════════════════════════════════
// 真實資料 (來源: 東森寵物全台門店GM統計-5_13資料更新.xlsx)
// ══════════════════════════════════════════════
const REGIONS = [
  { id:'r1', name:'北桃區', manager:'陳岳翔', color:'#f59e0b', stores:[

// ── 情感推算（依真實評分） ──
function calcSentiment(rating) {
  const pos = Math.min(97, Math.round((rating - 1) / 4 * 100 + (rating >= 4.5 ? 8 : 0)));
  const neg = Math.max(1, Math.round((5 - rating) * 7));
  return { pos, neu: Math.max(1, 100 - pos - neg), neg };
}
function regionAvg(r) {
  const avg = r.stores.reduce((a,s)=>a+s.rating,0)/r.stores.length;
  const total = r.stores.reduce((a,s)=>a+s.count,0);
  return { avg: parseFloat(avg.toFixed(2)), total, ...calcSentiment(avg) };
}

// ── CORE: 用 SerpApi 抓取真實 Google Maps 評論 ──
async function fetchRealReviews(storeName, regionName) {
  const fetchOpts = { method: 'GET', mode: 'cors', cache: 'no-cache' };

  // Step 1: 透過 Proxy 搜尋店名取得 data_id
  const searchUrl = `${PROXY_URL}/search?engine=google_maps&q=${encodeURIComponent('東森寵物 ' + storeName)}&hl=zh-tw&gl=tw`;
  
  let dataId = null;
  let d1;
  try {
    const r1 = await fetch(searchUrl, fetchOpts);
    if (!r1.ok) throw new Error('HTTP ' + r1.status);
    d1 = await r1.json();
    if (d1.error) throw new Error(d1.error);
    // 處理 local_results（多筆結果）
    if (d1.local_results && d1.local_results.length > 0) {
      const matched = d1.local_results.find(r => r.title && r.title.includes(storeName.replace(/[店館院]/g,'')))
                   || d1.local_results[0];
      dataId = matched.data_id;
    }
    // 處理 place_results（單一結果）
    else if (d1.place_results && d1.place_results.data_id) {
      dataId = d1.place_results.data_id;
    }
  } catch(e) {
    throw new Error('搜尋失敗: ' + e.message);
  }

  if (!dataId) throw new Error('找不到門市資料，請確認門市名稱');

  // Step 2: 透過 Proxy 用 data_id 抓取真實評論
  const reviewUrl = `${PROXY_URL}/search?engine=google_maps_reviews&data_id=${encodeURIComponent(dataId)}&hl=zh-tw&sort_by=newestFirst`;
  
  let reviews = [], placeInfo = null;
  try {
    const r2 = await fetch(reviewUrl, fetchOpts);
    if (!r2.ok) throw new Error('HTTP ' + r2.status);
    const d2 = await r2.json();
    if (d2.error) throw new Error(d2.error);
    reviews = d2.reviews || [];
    placeInfo = d2.place_info || null;
  } catch(e) {
    throw new Error('抓取評論失敗: ' + e.message);
  }

  if (reviews.length === 0) throw new Error('此門市目前無評論資料');
  return { reviews, placeInfo, dataId };
}

    : avgStars >= 4.3
    ? `本店表現穩定，正評率${posRate}%，顧客整體滿意。建議針對負評進行改善，提升整體評分。`
    : `本店有改善空間，正評率${posRate}%，建議區域負責人進行實地稽核，聚焦服務品質提升。`;

  return {
    reviews: analyzed,
    summary: {
      top_pros: themes.length > 0 ? themes.slice(0,3) : ['服務人員親切', '環境整潔', '商品齊全'],
      top_cons: negThemes.length > 0 ? negThemes.slice(0,2) : neg.length > 0 ? ['部分顧客反映有改善空間'] : ['暫無明顯缺點'],
      top_tips: negThemes.length > 0 ? ['加強員工培訓', '優化服務流程'] : ['持續維持現有水準', '鼓勵顧客留下評論'],
      conclusion
    }
  };
}

// ── 開啟 Modal ──
async function openModal(storeName, regionName, manager, url, rating, count) {
  document.getElementById('mTitle').textContent = `${storeName} — 真實評論分析`;
  document.getElementById('mSub').textContent = `${regionName} · ${manager}區 · ⭐${rating} · ${count.toLocaleString()}則評論`;
  document.getElementById('mBody').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
      <div class="loading-steps" id="loadSteps">
        <div id="s1" class="step-active">⏳ Step 1：搜尋 Google Maps 門市資料...</div>
        <div id="s2" class="step-pending">○ Step 2：抓取真實 Google 評論...</div>
        <div id="s3" class="step-pending">○ Step 3：AI 智能分析評論內容...</div>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');

  const setStep = (n, msg) => {
    for(let i=1;i<=3;i++) {
      const el = document.getElementById('s'+i);
      if(el) el.className = i<n?'step-done':i===n?'step-active':'step-pending';
      if(el && i<n) el.textContent = el.textContent.replace('⏳','✅').replace('○','✅');
      if(el && i===n && msg) el.textContent = '⏳ ' + msg;
    }
    document.getElementById('prog').style.width = (n-1)*33+'%';
  };

  try {
    // Step 1: 搜尋門市
    setStep(1, 'Step 1：搜尋 Google Maps 門市資料...');
    const { reviews: rawReviews, placeInfo, dataId } = await fetchRealReviews(storeName, regionName);
    
    if (!rawReviews || rawReviews.length === 0) {
      throw new Error('此門市目前無法取得評論（可能需要更多搜尋配額）');
    }

    // Step 2: 取得評論
    setStep(2, 'Step 2：已取得 ' + rawReviews.length + ' 則真實評論...');
    await new Promise(r=>setTimeout(r,300));

    // Step 3: 本地自動分析（免費）
    setStep(3, 'Step 3：正在分析評論內容...');
    await new Promise(r=>setTimeout(r,300)); // 短暫等待讓 UI 更新
    const analysis = analyzeReviewsLocal(rawReviews);
    
    document.getElementById('prog').style.width = '100%';
    await new Promise(r=>setTimeout(r,300));

    renderRealReviews(storeName, regionName, url, rating, count, rawReviews, analysis, placeInfo);

  } catch(err) {
    document.getElementById('mBody').innerHTML = `
      <div class="error-box">
        <strong>⚠️ 抓取失敗</strong><br><br>
        ${err.message}<br><br>
        <strong>可能原因：</strong><br>
        • SerpApi 免費方案每月 250 次搜尋限制（每間門市需 2 次：搜尋 + 取評論）<br>
        • 門市名稱在 Google Maps 上的搜尋結果不精確<br><br>
        <a href="${url}" target="_blank" style="color:var(--blue)">🔗 點此直接前往 Google Maps 查看真實評論</a>
      </div>`;
  }
}

    <div id="tg" style="display:none">${enriched.filter(r=>r.analysis.sentiment==='negative').map((r,i)=>realReviewCard(r,i)).join('')||noData()}</div>
    <div id="ts" style="display:none">

          </div>
        </div>
      </div>
      <div style="background:var(--surface2);border-radius:12px;padding:18px">

function realReviewCard(r, i) {
  const a = r.analysis;
  const sc = r.rating >= 4 ? 'var(--accent)' : r.rating >= 3 ? '#f59e0b' : 'var(--red)';
  const badge = a.sentiment==='positive'?'✅ 正評':a.sentiment==='neutral'?'🟡 中性':'❌ 負評';
  const stars = '★'.repeat(r.rating||0) + '☆'.repeat(5-(r.rating||0));
  const isGuide = r.user?.local_guide ? ' · 在地嚮導' : '';
  const reviewCount = r.user?.reviews ? ` · ${r.user.reviews}則評論` : '';
  
  return `
  <div class="rv ${a.sentiment}">
    <div class="rv-top">
      <div>
        <div class="rv-author">${r.user?.name || '匿名用戶'}</div>
        <div class="rv-author-meta">${isGuide}${reviewCount}</div>
      </div>
      <div class="rv-meta">
        <span class="rv-stars" style="color:${sc}">${stars}</span>
        <span class="rv-date">${r.date || ''}</span>
        <span class="sbadge ${a.sentiment}">${badge}</span>
      </div>
    </div>
    <div class="rv-text">${r.snippet || r.text || '（此評論無文字內容）'}</div>
    <div class="rv-analysis">
      ${a.pros?`<div class="av"><span class="al p">✅ 優點</span><span class="ac">${a.pros}</span></div>`:''}
      ${a.cons?`<div class="av"><span class="al c">⚠️ 缺點</span><span class="ac">${a.cons}</span></div>`:''}
      ${a.tip?`<div class="av"><span class="al t">💡 建議</span><span class="ac">${a.tip}</span></div>`:''}
    </div>
  </div>`;
}

function noData() { return '<p style="color:var(--muted);text-align:center;padding:24px">無此類評論</p>'; }
function swTab(el, id) {
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['ta','tp','tn','tg','ts'].forEach(t=>{
    const e=document.getElementById(t); if(e) e.style.display=(t===id?'':'none');
  });
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });

let charts = {};
function destroyCharts() { Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }
function mkChart(id, type, data, opts={}) {
  const ctx = document.getElementById(id); if(!ctx) return;
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(ctx, { type, data, options:{
    responsive:true,
    plugins:{legend:{labels:{color:'#7a8ba8',font:{size:11}}}},
    scales: ['doughnut','pie','radar'].includes(type) ? {} : {
      y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#7a8ba8'}},
      x:{grid:{display:false},ticks:{color:'#7a8ba8',maxRotation:40,font:{size:10}}}
    }, ...opts
  }});
}

function showView(view, rid) {
  destroyCharts();
  document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById(rid?`sb-${rid}`:`sb-${view}`);
  if(el) el.classList.add('active');
  const c = document.getElementById('content');
  if(view==='overview') renderOverview(c);
  else if(view==='ranking') renderRanking(c);
  else if(view==='conclusion') renderConclusion(c);
  else if(view==='region') renderRegion(c, rid);
}

function fAll() {
  const q=(document.getElementById('fs').value||'').toLowerCase();
  const rf=document.getElementById('fr').value;
  const sort=document.getElementById('fsort').value;
  let items=REGIONS.flatMap(r=>r.stores.map(s=>({...s,region:r})));
  if(q) items=items.filter(s=>s.name.includes(q));
  if(rf) items=items.filter(s=>s.region.id===rf);
  if(sort==='rd') items.sort((a,b)=>b.rating-a.rating);
  else if(sort==='ra') items.sort((a,b)=>a.rating-b.rating);
  else if(sort==='cd') items.sort((a,b)=>b.count-a.count);
  else if(sort==='ca') items.sort((a,b)=>a.count-b.count);
  document.getElementById('allGrid').innerHTML=items.map(s=>storeCard(s,s.region)).join('');
}

function renderRanking(el) {
  const all=REGIONS.flatMap(r=>r.stores.map(s=>({...s,region:r})));
  const byRating=[...all].sort((a,b)=>b.rating-a.rating);
  const byCount=[...all].sort((a,b)=>b.count-a.count);
  const low=[...all].filter(s=>s.rating<4.4).sort((a,b)=>a.rating-b.rating);
  const medal=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="color:var(--muted)">#${i+1}</span>`;
  const tRow=(s,i)=>`<tr onclick="openModal('${s.name.replace(/'/g,"\\'")}','${s.region.name}','${s.region.manager}','${s.url}',${s.rating},${s.count})" style="cursor:pointer">
    <td style="text-align:center;font-size:1rem">${medal(i)}</td>
    <td style="font-weight:600">${s.name}</td>
    <td><span style="font-size:.7rem;background:${s.region.color}22;color:${s.region.color};padding:2px 8px;border-radius:4px;border:1px solid ${s.region.color}44">${s.region.name}</span></td>
    <td style="font-weight:700;color:var(--accent)">${s.rating} ⭐</td>
    <td style="color:var(--muted)">${s.count.toLocaleString()}</td>
    <td><button class="btn-live" style="font-size:.65rem" onclick="event.stopPropagation();openModal('${s.name.replace(/'/g,"\\'")}','${s.region.name}','${s.region.manager}','${s.url}',${s.rating},${s.count})"><div class="live-dot"></div>分析</button></td>
  </tr>`;
  el.innerHTML=`
    <div class="sec-title">🏆 評分排行榜（Top 20）</div>
    <div class="data-table" style="margin-bottom:28px"><table><thead><tr><th>排名</th><th>門市</th><th>區域</th><th>評分</th><th>評論數</th><th></th></tr></thead><tbody>${byRating.slice(0,20).map(tRow).join('')}</tbody></table></div>
    <div class="sec-title">⚠️ 需關注門市（評分 &lt; 4.4）</div>
    <div class="data-table" style="margin-bottom:28px"><table><thead><tr><th>排名</th><th>門市</th><th>區域</th><th>評分</th><th>評論數</th><th></th></tr></thead><tbody>${low.map(tRow).join('')}</tbody></table></div>
    <div class="sec-title">💬 聲量最大（評論數 Top 15）</div>
    <div class="data-table"><table><thead><tr><th>排名</th><th>門市</th><th>區域</th><th>評分</th><th>評論數</th><th></th></tr></thead><tbody>${byCount.slice(0,15).map(tRow).join('')}</tbody></table></div>`;
}

function renderConclusion(el) {
  const allS=REGIONS.flatMap(r=>r.stores);
  const avgR=(allS.reduce((a,s)=>a+s.rating,0)/allS.length).toFixed(2);
  const above48=allS.filter(s=>s.rating>=4.8).length;
  const below44=allS.filter(s=>s.rating<4.4).length;
  const best=REGIONS.map(r=>({r,a:regionAvg(r)})).sort((a,b)=>b.a.avg-a.a.avg);
  el.innerHTML=`
    <div class="sec-title">📋 結論與改善建議</div>
    <div class="stats">
      <div class="stat gold"><div class="stat-lbl">全台平均評分</div><div class="stat-val">${avgR}</div><div class="stat-sub">整體表現優良</div></div>
      <div class="stat grn"><div class="stat-lbl">4.8分以上優質門市</div><div class="stat-val">${above48}</div><div class="stat-sub">佔全台 ${Math.round(above48/allS.length*100)}%</div></div>
      <div class="stat red"><div class="stat-lbl">4.4分以下待加強</div><div class="stat-val">${below44}</div><div class="stat-sub">需優先輔導</div></div>
      <div class="stat blu"><div class="stat-lbl">最佳區域</div><div class="stat-val" style="font-size:1.3rem">${best[0].r.name}</div><div class="stat-sub">${best[0].r.manager} 均分 ${best[0].a.avg}</div></div>
    </div>
    <div class="charts">
      <div class="chart-box"><h3>各區評分雷達圖</h3><canvas id="cRad" style="max-height:260px"></canvas></div>
      <div class="chart-box"><h3>評分分布（門市數量）</h3><canvas id="cDist"></canvas></div>
    </div>
    <div class="concl">
      <div style="font-size:1rem;font-weight:700;margin-bottom:18px">🎯 整體分析結論</div>
      <div class="concl-grid">
        <div class="concl-sec s"><h4>✅ 全台優勢</h4><ul class="concl-list">
          <li>全台平均評分 ${avgR}，整體口碑表現優良</li>
          <li>${above48} 家門市達 4.8 分以上，高優質比例</li>
          <li>${best[0].r.name}（${best[0].r.manager}）為表現最佳區域</li>
          <li>台南西門店 2607 則、新莊旗艦店 1611 則聲量最大</li>
          <li>宜花區、中投區表現最穩定均衡</li>
        </ul></div>
        <div class="concl-sec w"><h4>⚠️ 需改善問題</h4><ul class="concl-list">
          <li>士林文林二店評分僅 1.0，需立即查明原因</li>
          <li>${below44} 家門市低於 4.4 分需輔導</li>
          <li>高雄區平均評分最低，需全區改善</li>
          <li>苓雅大順店、前金自立店評分偏低（4.3）</li>
          <li>桃園巨蛋店評論數最多但評分僅 4.4</li>
        </ul></div>
        <div class="concl-sec i"><h4>💡 改善策略</h4><ul class="concl-list">
          <li>低評分門市進行實地訪查與人員輔導</li>
          <li>建立每月 Google 評分追蹤 KPI 機制</li>
          <li>高評分門市設為標竿，推廣 SOP</li>
          <li>高聲量但低評分門市優先回覆負評</li>
          <li>各區負責人每週報告評分變化</li>
        </ul></div>
        <div class="concl-sec n"><h4>🚀 短中期行動</h4><ul class="concl-list">
          <li>【即期】士林文林二店查明評分異常</li>
          <li>【即期】高雄區全區服務品質稽核</li>
          <li>【短期】設立 Google 評論回覆規範</li>
          <li>【短期】推行標竿門市交流學習計畫</li>
          <li>【中期】建立全台評分月度報告制度</li>
        </ul></div>
      </div>
    </div>
    <div class="sec-title">📊 各區詳細評比（按評分排序）</div>
    <div class="region-table">
      <div class="rt-row rt-head"><div>區域 / 負責人</div><div>情感分布</div><div style="text-align:right">平均評分</div><div style="text-align:center">門市數</div></div>
      ${[...REGIONS].sort((a,b)=>regionAvg(b).avg-regionAvg(a).avg).map(r=>{const a=regionAvg(r);return`
        <div class="rt-row">
          <div><div class="rt-name" style="color:${r.color}" onclick="showView('region','${r.id}')">${r.name}</div><div style="font-size:.68rem;color:var(--muted)">${r.manager} 區</div></div>
          <div><div class="rt-bar"><div class="bar-pos" style="width:${a.pos}%"></div><div class="bar-neu" style="width:${a.neu}%"></div><div class="bar-neg" style="width:${a.neg}%"></div></div>
          <div style="font-size:.62rem;margin-top:4px;display:flex;gap:8px;font-weight:600">
            <span style="color:#065f46">●${a.pos}%</span>
            <span style="color:#92400e">●${a.neu}%</span>
            <span style="color:#991b1b">●${a.neg}%</span>
          </div></div>
          <div class="rt-rating" style="color:${r.color}">${a.avg.toFixed(2)} ⭐</div>
          <div class="rt-stores">${r.stores.length}</div>
        </div>`}).join('')}
    </div>`;
  setTimeout(()=>{
    mkChart('cRad','radar',{labels:REGIONS.map(r=>r.name),datasets:[{label:'平均評分',data:REGIONS.map(r=>regionAvg(r).avg),fill:true,backgroundColor:'rgba(245,158,11,0.15)',borderColor:'#f59e0b',pointBackgroundColor:'#f59e0b'}]},{options:{scales:{r:{min:3.8,max:5.1,grid:{color:'rgba(255,255,255,0.1)'},pointLabels:{color:'#e2e8f0',font:{size:11}},ticks:{display:false}}}}});
    const bins=[{l:'< 4.0',mn:0,mx:3.99},{l:'4.0-4.2',mn:4.0,mx:4.29},{l:'4.3-4.4',mn:4.3,mx:4.49},{l:'4.5-4.6',mn:4.5,mx:4.69},{l:'4.7-4.8',mn:4.7,mx:4.89},{l:'4.9-5.0',mn:4.9,mx:5.0}];
    const allS2=REGIONS.flatMap(r=>r.stores);
    mkChart('cDist','bar',{labels:bins.map(b=>b.l),datasets:[{label:'門市數',data:bins.map(b=>allS2.filter(s=>s.rating>=b.mn&&s.rating<=b.mx).length),backgroundColor:['#ef444488','#f9731688','#f59e0b88','#10b98188','#6366f188','#a855f788'],borderColor:['#ef4444','#f97316','#f59e0b','#10b981','#6366f1','#a855f7'],borderWidth:2,borderRadius:4}]});
  },80);
}

buildSidebar();
showView('overview');
</script>
</body>
</html>
