<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>東森寵物 Google評論分析系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--accent:#d97706;--green:#059669;--red:#dc2626;--blue:#4f46e5;--text:#1e293b;--muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 6px rgba(0,0,0,.07);--shadow-lg:0 10px 15px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1e3a5f,#1e40af 50%,#312e81);border-bottom:3px solid #f59e0b;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-icon{width:42px;height:42px;background:linear-gradient(135deg,#f59e0b,#f97316);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-title h1{font-size:1.1rem;font-weight:800;color:#fff}
.hdr-title p{font-size:.68rem;color:#93c5fd;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px}
.legend{display:flex;align-items:center;gap:8px;font-size:.68rem;background:rgba(255,255,255,.12);padding:6px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.2);color:#e2e8f0}
.legend span{display:flex;align-items:center;gap:3px}
.ld{width:9px;height:9px;border-radius:50%}
.badge{background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:800;font-size:.65rem;padding:4px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:flex;min-height:calc(100vh - 80px)}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto;height:calc(100vh - 80px);position:sticky;top:80px;box-shadow:2px 0 6px rgba(0,0,0,.04)}
.content{flex:1;padding:22px 26px;overflow-y:auto}
.sb-sec{font-size:.6rem;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:10px 14px 3px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;border-radius:0 6px 6px 0;margin:1px 6px 1px 0}
.sb-item:hover{background:#eff6ff;border-left-color:#93c5fd}
.sb-item.active{background:#eff6ff;border-left-color:#1e40af}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sb-name{font-size:.78rem;font-weight:600;flex:1;color:var(--text)}
.sb-item.active .sb-name{color:#1e40af;font-weight:700}
.sb-cnt{font-size:.63rem;background:var(--bg);color:var(--muted);padding:1px 6px;border-radius:8px;border:1px solid var(--border)}
.sb-div{height:1px;background:var(--border);margin:6px 12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow-md);position:relative;overflow:hidden;transition:transform .2s}
.stat:hover{transform:translateY(-2px)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.stat.gold::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.stat.grn::before{background:linear-gradient(90deg,#059669,#10b981)}
.stat.red::before{background:linear-gradient(90deg,#dc2626,#ef4444)}
.stat.blu::before{background:linear-gradient(90deg,#4f46e5,#6366f1)}
.stat-lbl{font-size:.68rem;color:var(--muted);margin-bottom:6px;font-weight:600}
.stat-val{font-size:1.9rem;font-weight:900;line-height:1}
.stat.gold .stat-val{color:#b45309}.stat.grn .stat-val{color:#065f46}.stat.red .stat-val{color:#991b1b}.stat.blu .stat-val{color:#312e81}
.stat-sub{font-size:.65rem;color:var(--muted);margin-top:5px}
.sec-title{font-size:.95rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--border),transparent)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.chart-box h3{font-size:.7rem;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rtable{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow)}
.rt-row{display:grid;grid-template-columns:170px 1fr 80px 55px;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border)}
.rt-row:last-child{border-bottom:none}.rt-row:hover{background:var(--surface2)}
.rt-head{background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#e2e8f0;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rt-name{font-size:.82rem;font-weight:700;cursor:pointer}.rt-name:hover{color:#1e40af}
.rt-bar{height:20px;border-radius:5px;background:var(--bg);overflow:hidden;display:flex;border:1px solid var(--border)}
.bp{background:linear-gradient(90deg,#059669,#10b981)}
.bn{background:linear-gradient(90deg,#d97706,#f59e0b)}
.br{background:linear-gradient(90deg,#dc2626,#ef4444)}
.rt-rating{font-size:.85rem;font-weight:800;text-align:right}
.rt-stores{font-size:.7rem;color:var(--blue);text-align:center;font-weight:700}
.fbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fi{background:var(--surface);border:2px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:.76rem;font-family:inherit;cursor:pointer;box-shadow:var(--shadow)}
.fi:focus{outline:none;border-color:#1e40af}.fi::placeholder{color:var(--muted)}
input.fi{flex:1;min-width:180px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:22px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.sc:hover{border-color:#1e40af;transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.sc-head{padding:12px 15px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2)}
.sc-name{font-size:.88rem;font-weight:800;margin-bottom:3px;color:var(--text)}
.sc-tag{font-size:.6rem;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:4px;font-weight:600}
.sc-r{text-align:right;flex-shrink:0;margin-left:8px}
.sc-num{font-size:1.5rem;font-weight:900;line-height:1.1}
.sc-cnt{font-size:.63rem;color:var(--muted);font-weight:500}
.sc-body{padding:11px 15px}
.sbar-wrap{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.sbar{flex:1;height:7px;border-radius:4px;background:var(--bg);overflow:hidden;display:flex;border:1px solid var(--border)}
.sl{font-size:.62rem;font-weight:700;white-space:nowrap}
.sl-p{color:#065f46}.sl-n{color:#92400e}.sl-r{color:#991b1b}
.sc-foot{padding:9px 15px;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.glink{font-size:.7rem;color:#1e40af;text-decoration:none;font-weight:600}
.glink:hover{text-decoration:underline}
.btn-live{font-size:.68rem;background:linear-gradient(135deg,#059669,#047857);border:none;color:#fff;padding:5px 11px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;display:flex;align-items:center;gap:4px;box-shadow:0 2px 4px rgba(5,150,105,.3)}
.btn-live:hover{background:linear-gradient(135deg,#047857,#065f46)}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:92%;max-width:840px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,.15)}
.modal-hdr{padding:18px 22px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(135deg,#1e3a5f,#1e40af)}
.modal-title{font-size:1.05rem;font-weight:800;color:#fff}
.modal-sub{font-size:.72rem;color:#93c5fd;margin-top:3px}
.modal-x{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:.95rem;transition:all .15s}
.modal-x:hover{background:rgba(220,38,38,.4)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1;background:var(--bg)}
.mtabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.mtab{padding:5px 13px;border-radius:6px;border:2px solid var(--border);background:var(--surface);cursor:pointer;font-size:.72rem;color:var(--muted);transition:all .15s;font-weight:600}
.mtab:hover{border-color:#1e40af;color:#1e40af}
.mtab.active{background:#1e40af;color:#fff;border-color:#1e40af}
.rv{border-radius:10px;padding:14px;margin-bottom:10px;border:2px solid}
.rv.positive{background:#dcfce7;border-color:#86efac}
.rv.neutral{background:#fef9c3;border-color:#fde047}
.rv.negative{background:#fee2e2;border-color:#fca5a5}
.rv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.rv-author{font-size:.86rem;font-weight:800;color:var(--text)}
.rv-meta-row{font-size:.66rem;color:var(--muted);margin-top:2px}
.rv-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.rv-stars{font-size:.75rem}
.rv-date{font-size:.65rem;color:var(--muted)}
.sbadge{font-size:.6rem;font-weight:800;padding:2px 9px;border-radius:20px}
.sbadge.positive{background:#059669;color:#fff}
.sbadge.neutral{background:#d97706;color:#fff}
.sbadge.negative{background:#dc2626;color:#fff}
.rv-text{font-size:.82rem;line-height:1.7;color:#1e293b;margin-bottom:10px}
.rv-ana{background:rgba(0,0,0,.04);border-radius:8px;padding:11px;border:1px solid rgba(0,0,0,.07)}
.av{display:flex;gap:7px;margin-bottom:5px;font-size:.74rem}
.av:last-child{margin-bottom:0}
.al{white-space:nowrap;font-weight:800;min-width:54px}
.al.p{color:#065f46}.al.c{color:#991b1b}.al.t{color:#312e81}
.ac{color:var(--text);line-height:1.5}
.src-badge{font-size:.6rem;background:#dcfce7;color:#065f46;border:1px solid #86efac;padding:3px 9px;border-radius:5px;display:inline-flex;align-items:center;gap:4px;margin-bottom:10px;font-weight:700}
.sum-box{background:var(--surface);border-radius:10px;padding:16px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.sum-col h4{font-size:.68rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid}
.sum-col.p h4{color:#065f46;border-color:#86efac}
.sum-col.c h4{color:#991b1b;border-color:#fca5a5}
.sum-col.t h4{color:#312e81;border-color:#a5b4fc}
.sum-col ul{list-style:none}
.sum-col ul li{font-size:.76rem;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);display:flex;gap:5px;line-height:1.5}
.sum-col ul li::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.sum-col.p ul li::before{background:#059669}.sum-col.c ul li::before{background:#dc2626}.sum-col.t ul li::before{background:#4f46e5}
.concl{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;border-radius:12px;padding:20px;margin-bottom:22px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.cs h4{font-size:.68rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding:5px 9px;border-radius:5px}
.cs.s h4{color:#065f46;background:#dcfce7}
.cs.w h4{color:#991b1b;background:#fee2e2}
.cs.i h4{color:#92400e;background:#fef3c7}
.cs.n h4{color:#312e81;background:#ede9fe}
.cl{list-style:none}
.cl li{font-size:.78rem;color:var(--text);padding:4px 0 4px 13px;position:relative;line-height:1.55}
.cl li::before{content:'→';position:absolute;left:0;font-weight:800}
.cs.s .cl li::before{color:#059669}.cs.w .cl li::before{color:#dc2626}.cs.i .cl li::before{color:#d97706}.cs.n .cl li::before{color:#4f46e5}
.dtable{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow)}
.dtable table{width:100%;border-collapse:collapse}
.dtable th{padding:10px 14px;text-align:left;font-size:.66rem;color:#e2e8f0;font-weight:700;background:linear-gradient(135deg,#1e3a5f,#1e40af);text-transform:uppercase;letter-spacing:.5px}
.dtable td{padding:10px 14px;font-size:.8rem;border-top:1px solid var(--border);color:var(--text)}
.dtable tr:hover td{background:var(--surface2)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:12px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:#059669;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:.8rem;color:var(--muted);font-weight:600}
.pbar{width:260px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#059669,#10b981);border-radius:2px;transition:width .5s ease}
.s-done{color:#059669;font-weight:700}.s-act{color:#d97706;font-weight:700}.s-pend{color:var(--muted)}
.lsteps{font-size:.76rem;text-align:center;line-height:2}
.ebox{background:#fee2e2;border:2px solid #fca5a5;border-radius:10px;padding:16px;color:#991b1b;font-size:.8rem;line-height:1.7}
@media(max-width:1200px){.stats{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}.cg{grid-template-columns:1fr}.sum-grid{grid-template-columns:1fr}}
@media(max-width:900px){.sidebar{display:none}.content{padding:14px}.sgrid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}.rt-row{grid-template-columns:110px 1fr 65px 45px;gap:7px;padding:9px 12px}.legend{display:none}}
@media(max-width:600px){.hdr{padding:10px 14px}.hdr-title h1{font-size:.95rem}.stats{grid-template-columns:repeat(2,1fr);gap:9px}.stat{padding:13px}.stat-val{font-size:1.6rem}.sgrid{grid-template-columns:1fr}.modal{width:99%;max-height:96vh}.modal-hdr{padding:14px}.modal-body{padding:12px}.mtab{padding:4px 9px;font-size:.68rem}.fbar{flex-direction:column}input.fi{min-width:unset;width:100%}.cg{grid-template-columns:1fr}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

function calcSent(r){
  // 依評分精確計算情感比例
  var pos,neu,neg;
  if(r>=4.8){pos=Math.round(85+(r-4.8)*50);neg=Math.round((5-r)*5);neu=100-pos-neg;}
  else if(r>=4.5){pos=Math.round(70+(r-4.5)*50);neg=Math.round((5-r)*8);neu=100-pos-neg;}
  else if(r>=4.0){pos=Math.round(40+(r-4.0)*60);neg=Math.round((5-r)*10);neu=100-pos-neg;}
  else if(r>=3.0){pos=Math.round((r-3.0)*40);neg=Math.round(20+(4.0-r)*20);neu=100-pos-neg;}
  else if(r>=2.0){pos=0;neg=Math.round(60+(3.0-r)*30);neu=100-neg;}
  else{pos=0;neg=95;neu=5;}
  pos=Math.max(0,Math.min(100,pos));
  neg=Math.max(0,Math.min(100,neg));
  neu=Math.max(0,100-pos-neg);
  return{pos:pos,neu:neu,neg:neg};
}
function rAvg(region){
  var avg=region.stores.reduce(function(a,s){return a+s.rating;},0)/region.stores.length;
  var total=region.stores.reduce(function(a,s){return a+s.count;},0);
  var s=calcSent(avg);
  return{avg:parseFloat(avg.toFixed(2)),total:total,pos:s.pos,neu:s.neu,neg:s.neg};
}

var charts={};
function destroyCharts(){Object.values(charts).forEach(function(c){try{c.destroy();}catch(e){}});charts={};}
function mkChart(id,type,data,opts){
  var ctx=document.getElementById(id);if(!ctx)return;
  if(charts[id])charts[id].destroy();
  var defaults={responsive:true,plugins:{legend:{labels:{color:'#64748b',font:{size:11}}}},scales:(['doughnut','pie','radar'].indexOf(type)>-1)?{}:{y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#64748b'}},x:{grid:{display:false},ticks:{color:'#64748b',maxRotation:40,font:{size:10}}}}};
  charts[id]=new Chart(ctx,{type:type,data:data,options:Object.assign({},defaults,opts||{})});
}

function showView(view,rid){
  destroyCharts();
  document.querySelectorAll('.sb-item').forEach(function(e){e.classList.remove('active');});
  var sid=rid?'sb-'+rid:'sb-'+view;
  var el=document.getElementById(sid);if(el)el.classList.add('active');
  var c=document.getElementById('content');
  if(view==='overview')renderOverview(c);
  else if(view==='ranking')renderRanking(c);
  else if(view==='conclusion')renderConclusion(c);
  else if(view==='region')renderRegion(c,rid);
  updateDate();
}

function fAll(){
  var q=(document.getElementById('fs').value||'').toLowerCase();

  if(rf)items=items.filter(function(s){return s.region.id===rf;});
  if(sort==='rd')items.sort(function(a,b){return b.rating-a.rating;});
  else if(sort==='ra')items.sort(function(a,b){return a.rating-b.rating;});

}

// MODAL - 真實評論抓取
async function openModal(storeName,regionName,manager,url,rating,count){
  document.getElementById('mTitle').textContent=storeName+' — 真實評論分析';
  document.getElementById('mSub').textContent=regionName+' · '+manager+'區 · ⭐'+rating+' · '+count.toLocaleString()+'則評論';
  document.getElementById('mBody').innerHTML='<div class="loading"><div class="spinner"></div><div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div><div class="lsteps"><div id="s1" class="s-act">⏳ Step 1：搜尋 Google Maps 門市資料...</div><div id="s2" class="s-pend">○ Step 2：抓取真實 Google 評論...</div><div id="s3" class="s-pend">○ Step 3：分析評論內容...</div></div></div>';
  document.getElementById('modal').classList.add('open');
  function setStep(n,msg){
    for(var i=1;i<=3;i++){
      var e=document.getElementById('s'+i);if(!e)continue;
      e.className=i<n?'s-done':i===n?'s-act':'s-pend';
      if(i<n)e.textContent=e.textContent.replace('⏳','✅').replace('○','✅');
      if(i===n&&msg)e.textContent='⏳ '+msg;
    }
    var pf=document.getElementById('prog');if(pf)pf.style.width=((n-1)*33)+'%';
  }
  try{
    setStep(1,'Step 1：搜尋 Google Maps 門市資料...');
    var searchUrl=PROXY_URL+'/search?engine=google_maps&q='+encodeURIComponent('東森寵物 '+storeName)+'&hl=zh-tw&gl=tw';
    var r1=await fetch(searchUrl,{method:'GET',mode:'cors'});
    if(!r1.ok)throw new Error('搜尋失敗 HTTP '+r1.status);
    var d1=await r1.json();
    if(d1.error)throw new Error(d1.error);
    var dataId=null;
    if(d1.local_results&&d1.local_results.length>0){
      var matched=null;
      for(var i=0;i<d1.local_results.length;i++){
        if(d1.local_results[i].title&&d1.local_results[i].title.indexOf(storeName.replace(/[店館院]/g,''))>-1){matched=d1.local_results[i];break;}
      }
      if(!matched)matched=d1.local_results[0];
      dataId=matched.data_id;
    }else if(d1.place_results&&d1.place_results.data_id){
      dataId=d1.place_results.data_id;
    }
    if(!dataId)throw new Error('找不到門市資料');
    setStep(2,'Step 2：抓取真實 Google 評論...');
    var reviewUrl=PROXY_URL+'/search?engine=google_maps_reviews&data_id='+encodeURIComponent(dataId)+'&hl=zh-tw&sort_by=newestFirst';
    var r2=await fetch(reviewUrl,{method:'GET',mode:'cors'});
    if(!r2.ok)throw new Error('抓取評論失敗 HTTP '+r2.status);
    var d2=await r2.json();
    if(d2.error)throw new Error(d2.error);
    var reviews=d2.reviews||[];
    if(reviews.length===0)throw new Error('此門市目前無評論資料');
    setStep(3,'Step 3：分析評論內容...');
    await new Promise(function(res){setTimeout(res,300);});
    var analysis=analyzeLocal(reviews,rating);
    var pf2=document.getElementById('prog');if(pf2)pf2.style.width='100%';
    await new Promise(function(res){setTimeout(res,200);});
    renderModal(storeName,regionName,url,rating,count,reviews,analysis);
  }catch(err){
    document.getElementById('mBody').innerHTML='<div class="ebox"><strong>⚠️ 抓取失敗：'+err.message+'</strong><br><br>可能原因：<br>• Proxy 伺服器正在從休眠喚醒（請等30秒後再試）<br>• SerpApi 搜尋額度不足<br><br><a href="'+url+'" target="_blank" style="color:#1e40af">🔗 點此直接前往 Google Maps 查看真實評論</a></div>';
  }
}

function analyzeLocal(reviews,storeRating){
  var posW=['棒','好','讚','優','喜歡','推薦','滿意','親切','專業','乾淨','整潔','用心','貼心','溫柔','耐心','細心','開心','舒適','方便','齊全','豐富','活潑'];
  var negW=['差','爛','糟','貴','慢','髒','臭','吵','擠','壞','失望','不好','不滿','問題'];
  var analyzed=reviews.slice(0,15).map(function(r,i){
    var stars=r.rating||5;
    var text=(r.snippet||r.text||'');
    var sent=stars>=4?'positive':stars>=3?'neutral':'negative';
    var nc=negW.filter(function(w){return text.indexOf(w)>-1;}).length;
    var pc=posW.filter(function(w){return text.indexOf(w)>-1;}).length;
    if(nc>pc+1&&sent==='positive')sent='neutral';
    if(pc>nc+2&&sent==='negative')sent='neutral';
    var pros=sent!=='negative'?(stars>=4?'服務優質親切':stars>=3?'環境尚可整潔':null):null;
    var cons=sent!=='positive'?(stars<=2?'服務態度差':stars===3?'服務效率待提升':null):null;
    var tip=sent!=='positive'?(stars<=2?'全面改善服務流程':stars===3?'加強服務速度':null):null;
    return{index:i+1,sentiment:sent,pros:pros,cons:cons,tip:tip};
  });
  var pos=analyzed.filter(function(r){return r.sentiment==='positive';}).length;
  var neg=analyzed.filter(function(r){return r.sentiment==='negative';}).length;
  var posRate=Math.round(pos/analyzed.length*100);
  var allText=reviews.slice(0,15).map(function(r){return r.snippet||r.text||'';}).join(' ');
  var themes=[];
  if(/店員|員工|服務人員/.test(allText))themes.push('店員服務親切');
  if(/美容|洗澡|剪毛/.test(allText))themes.push('美容技術優良');
  if(/商品|飼料|用品/.test(allText))themes.push('商品選擇豐富');
  if(/環境|乾淨|整潔/.test(allText))themes.push('環境整潔舒適');
  if(/住宿|寄宿/.test(allText))themes.push('住宿服務貼心');
  var negThemes=[];
  if(/等|慢|久/.test(allText))negThemes.push('等候時間較長');
  if(/貴|價格高/.test(allText))negThemes.push('價格偏高');
  if(/停車|車位/.test(allText))negThemes.push('停車不便');
  if(/態度|冷漠/.test(allText))negThemes.push('服務態度待改善');
  var conclusion=storeRating>=4.7?'本店整體表現優異，顧客滿意度達'+posRate+'%，為區域標竿門市。':storeRating>=4.3?'本店表現穩定，正評率'+posRate+'%。建議針對負評進行改善提升整體評分。':'本店有改善空間，正評率'+posRate+'%，建議區域負責人進行實地稽核。';
  return{reviews:analyzed,summary:{top_pros:themes.length>0?themes.slice(0,3):['服務人員親切','環境整潔','商品齊全'],top_cons:negThemes.length>0?negThemes.slice(0,2):(neg>0?['部分顧客有改善建議']:['暫無明顯缺點']),top_tips:negThemes.length>0?['加強員工培訓','優化服務流程']:['持續維持現有水準','鼓勵顧客留下評論'],conclusion:conclusion}};
}

function renderModal(storeName,regionName,url,rating,count,reviews,analysis){
  var aMap={};
  if(analysis&&analysis.reviews)analysis.reviews.forEach(function(a){aMap[a.index-1]=a;});
  var enriched=reviews.slice(0,15).map(function(r,i){return Object.assign({},r,{analysis:aMap[i]||{sentiment:r.rating>=4?'positive':r.rating>=3?'neutral':'negative',pros:null,cons:null,tip:null}});});
  var pos=enriched.filter(function(r){return r.analysis.sentiment==='positive';}).length;
  var neu=enriched.filter(function(r){return r.analysis.sentiment==='neutral';}).length;
  var neg=enriched.filter(function(r){return r.analysis.sentiment==='negative';}).length;
  var sum=analysis?analysis.summary:{};
  document.getElementById('mSub').textContent=regionName+' · ⭐'+rating+' · 已抓取 '+enriched.length+' 則真實評論 · 🟢'+pos+' 🟡'+neu+' 🔴'+neg;
  var html='<div class="src-badge">✅ 真實 Google Maps 評論 · 即時抓取 · '+new Date().toLocaleDateString('zh-TW')+'</div>';
  html+='<div class="mtabs"><div class="mtab active" onclick="swTab(this,\'ta\')">全部('+enriched.length+')</div>';
  html+='<div class="mtab" onclick="swTab(this,\'tp\')">🟢 正評('+pos+')</div>';
  html+='<div class="mtab" onclick="swTab(this,\'tn\')">🟡 中性('+neu+')</div>';
  html+='<div class="mtab" onclick="swTab(this,\'tg\')">🔴 負評('+neg+')</div>';
  html+='<div class="mtab" onclick="swTab(this,\'ts\')">📊 分析摘要</div></div>';
  html+='<div id="ta">'+enriched.map(function(r,i){return rvCard(r,i);}).join('')+'</div>';
  html+='<div id="tp" style="display:none">'+enriched.filter(function(r){return r.analysis.sentiment==='positive';}).map(function(r,i){return rvCard(r,i);}).join('')+'</div>';
  html+='<div id="tn" style="display:none">'+enriched.filter(function(r){return r.analysis.sentiment==='neutral';}).map(function(r,i){return rvCard(r,i);}).join('')+'</div>';
  html+='<div id="tg" style="display:none">'+enriched.filter(function(r){return r.analysis.sentiment==='negative';}).map(function(r,i){return rvCard(r,i);}).join('')+'</div>';
  html+='<div id="ts" style="display:none">';
  html+='<div class="sum-box"><div class="sum-grid">';
  html+='<div class="sum-col p"><h4>✅ 主要優點</h4><ul>'+(sum.top_pros||[]).map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>';
  html+='<div class="sum-col c"><h4>⚠️ 主要缺點</h4><ul>'+(sum.top_cons||[]).map(function(c){return '<li>'+c+'</li>';}).join('')+'</ul></div>';
  html+='<div class="sum-col t"><h4>🚀 改善建議</h4><ul>'+(sum.top_tips||[]).map(function(t){return '<li>'+t+'</li>';}).join('')+'</ul></div>';
  html+='</div></div>';
  html+='<div style="background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border)">';
  html+='<div style="font-size:.82rem;font-weight:800;margin-bottom:10px;color:#1e40af">🎯 整體結論</div>';
  html+='<p style="font-size:.82rem;color:var(--text);line-height:1.75">'+(sum.conclusion||'基於真實評論分析，此門市整體表現穩定。')+'</p>';
  html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><a href="'+url+'" target="_blank" style="color:#1e40af;font-size:.74rem;text-decoration:none">🔗 前往 Google Maps 查看「'+storeName+'」完整評論 →</a></div></div></div>';
  document.getElementById('mBody').innerHTML=html;
}

function rvCard(r,i){
  var a=r.analysis;
  var sc=r.rating>=4?'#d97706':r.rating>=3?'#f59e0b':'#dc2626';
  var badge=a.sentiment==='positive'?'✅ 正評':a.sentiment==='neutral'?'🟡 中性':'❌ 負評';
  var stars='';for(var k=0;k<(r.rating||0);k++)stars+='★';for(var k=0;k<5-(r.rating||0);k++)stars+='☆';
  var guide=r.user&&r.user.local_guide?' · 在地嚮導':'';
  var rcnt=r.user&&r.user.reviews?' · '+r.user.reviews+'則評論':'';
  var html='<div class="rv '+a.sentiment+'">';
  html+='<div class="rv-top"><div><div class="rv-author">'+(r.user&&r.user.name?r.user.name:'匿名用戶')+'</div><div class="rv-meta-row">'+guide+rcnt+'</div></div>';
  html+='<div class="rv-meta"><span class="rv-stars" style="color:'+sc+'">'+stars+'</span><span class="rv-date">'+(r.date||'')+'</span><span class="sbadge '+a.sentiment+'">'+badge+'</span></div></div>';
  html+='<div class="rv-text">'+(r.snippet||r.text||'（此評論無文字內容）')+'</div>';
  html+='<div class="rv-ana">';
  if(a.pros&&a.sentiment!=='negative')html+='<div class="av"><span class="al p">✅ 優點</span><span class="ac">'+a.pros+'</span></div>';
  if(a.cons)html+='<div class="av"><span class="al c">⚠️ 缺點</span><span class="ac">'+a.cons+'</span></div>';
  if(a.tip)html+='<div class="av"><span class="al t">💡 建議</span><span class="ac">'+a.tip+'</span></div>';
  if(!a.pros&&!a.cons&&!a.tip)html+='<div style="font-size:.74rem;color:var(--muted)">✨ 顧客滿意，無特別缺點</div>';
  html+='</div></div>';
  return html;
}

function swTab(el,id){
  document.querySelectorAll('.mtab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  ['ta','tp','tn','tg','ts'].forEach(function(t){var e=document.getElementById(t);if(e)e.style.display=(t===id?'':'none');});
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal();});

buildSidebar();
showView('overview');
</script>
